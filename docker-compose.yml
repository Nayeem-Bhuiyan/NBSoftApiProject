name: smartapp

services:

# ════════════════════════════════════════════════════════════════
  sqlserver:
# ════════════════════════════════════════════════════════════════
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartapp-sqlserver
    hostname: sqlserver
    restart: unless-stopped

    environment:
      ACCEPT_EULA:           "Y"
      MSSQL_PID:             "Developer"
      MSSQL_SA_PASSWORD:     ${SA_PASSWORD}
      MSSQL_MEMORY_LIMIT_MB: "3072"
      MSSQL_TCP_PORT:        "1433"

    ports:
      - "127.0.0.1:1435:1433"

    volumes:
      - mssql-data:/var/opt/mssql
      - type: bind
        source: C:/backups
        target: /var/opt/mssql/backup

    networks:
      - smartapp-internal

    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -b -o /dev/null"]
      interval: 15s
      timeout:  10s
      retries:  10
      start_period: 60s

    security_opt:
      - no-new-privileges:true

# ════════════════════════════════════════════════════════════════
  redis:
# ════════════════════════════════════════════════════════════════
    image: redis:7-alpine
    container_name: smartapp-redis
    hostname: redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
      --save 900 1
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --protected-mode yes

    ports:
      - "127.0.0.1:6379:6379"

    volumes:
      - redis-data:/data

    networks:
      - smartapp-internal

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

    security_opt:
      - no-new-privileges:true

# ════════════════════════════════════════════════════════════════
  smartapp-api:
# ════════════════════════════════════════════════════════════════
    build:
      context: .
      dockerfile: Dockerfile

    image: smartapp-api:latest
    container_name: smartapp-api
    hostname: smartapp-api
    restart: unless-stopped

    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS:        http://+:8080
      ApiDocumentation__EnableOpenApi: "true"
      ApiDocumentation__EnableScalar: "true"

      # Data Protection Fix
      ASPNETCORE_DATAPROTECTION__DIRECTORY: "/app/DataProtection-Keys"
      DataProtection__Directory: "/app/DataProtection-Keys"

      ConnectionStrings__AppDbConnection: "Server=sqlserver;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true;Connect Timeout=60;"
      ConnectionStrings__Redis:           "redis:6379,password=${REDIS_PASSWORD},abortConnect=false,connectRetry=5,connectTimeout=10000"

      Jwt__Key:                             ${JWT_KEY}
      Jwt__Issuer:                          ${JWT_ISSUER}
      Jwt__Audience:                        ${JWT_AUDIENCE}
      Jwt__AccessTokenExpirationMinutes:    ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
      Jwt__RefreshTokenExpirationDays:      ${JWT_REFRESH_TOKEN_EXPIRY_DAYS}
      Jwt__RefreshTokenRotationGraceSeconds: ${JWT_ROTATION_GRACE_SECONDS}
      Jwt__AllowInsecureHttp:               "true"

      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2}

    ports:
      - "8080:8080"

    volumes:
      - type: bind
        source: ./uploads/wwwroot
        target: /app/wwwroot
      - app-logs:/app/logs
      - dataprotection-keys:/app/DataProtection-Keys

    networks:
      - smartapp-internal
      - smartapp-external

    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --max-time 5 http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  8
      start_period: 120s

    security_opt:
      - no-new-privileges:true

    tmpfs:
      - /tmp:size=100m,mode=1777

# ════════════════════════════════════════════════════════════════
networks:
# ════════════════════════════════════════════════════════════════
  smartapp-internal:
    name: smartapp-internal
    driver: bridge
    internal: true

  smartapp-external:
    name: smartapp-external
    driver: bridge
    internal: false

# ════════════════════════════════════════════════════════════════
volumes:
# ════════════════════════════════════════════════════════════════
  mssql-data:
    name: smartapp_mssql-data

  redis-data:
    name: smartapp_redis-data

  app-logs:
    name: smartapp_app-logs

  dataprotection-keys:
    name: smartapp-dataprotection-keys